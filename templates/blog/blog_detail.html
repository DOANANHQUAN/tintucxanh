{% extends 'base.html' %}
{% load static %}
{% load markdown_extras %}

{% block title %}{{ blog.title }}{% endblock %}

{% block content %}
<div class="container">
    <div class="col-lg-8">
        <h2 class="mb-4">{{ blog.title }}</h2>
        <img src="{{ blog.thumbnail.url }}" alt="Ảnh đại diện" class="img-fluid mb-4" style="width: 100%; height: 500px; object-fit: contain; background-color: #e0e0e0">
        <p>{{ blog.content|safe }}</p>
    </div>
</div>
{% endblock %}
